name: generate_result

# Regenerates the coverage docs (README.md summary + api.md table): every UI5
# demo kit sample per focused library, marked with whether an abap2UI5 port
# exists. The sample universe snapshot ui5/universe.json is REFRESHED from a
# shallow OpenUI5 checkout (sample dirs + api.json via `grunt jsdoc`); the
# ported set is read from the meta/ sidecars.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'   # weekly, Monday 03:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate_result
  cancel-in-progress: false

jobs:
  generate_result:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'

    - name: Shallow clone OpenUI5 (sample universe)
      run: git clone --depth 1 https://github.com/SAP/openui5.git openui5

    # Control metadata source. Keep the built libraries in sync with FOCUS_LIBS
    # in scripts/generate-coverage.mjs. The jsdoc task may exit non-zero on
    # cross-library type warnings while still writing a valid api.json, so we
    # tolerate the exit code and assert the artifact exists instead.
    - name: Build control metadata (api.json) for focused libraries
      working-directory: openui5
      run: |
        npm ci
        npx grunt jsdoc:library-sap.m || true
        test -f target/openui5-sdk/test-resources/sap/m/designtime/api.json

    - name: Refresh the 1.71 property snapshot
      env:
        OPENUI5_DIR: ./openui5
      run: node scripts/generate-properties.mjs

    - name: Regenerate coverage (README + api.md)
      env:
        OPENUI5_DIR: ./openui5
        APIJSON_ROOT: ./openui5/target/openui5-sdk/test-resources
        REF: main
      run: node scripts/generate-coverage.mjs

    - name: Regenerate the in-system overview app
      run: node scripts/generate-overview.mjs

    - name: Drop OpenUI5 checkout
      run: rm -rf openui5

    - name: Stamp last generated date into README
      run: |
        STAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
        sed -i "s|<!-- last-run -->.*<!-- /last-run -->|<!-- last-run -->$STAMP<!-- /last-run -->|" README.md

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        add-paths: |
          api.md
          README.md
          ui5/universe.json
          ui5/properties.json
          src/z2ui5_cl_api_app_overview.clas.abap
          src/z2ui5_cl_api_app_overview.clas.xml
        commit-message: Regenerate sample coverage
        author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
        committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
        branch: generate_result/regenerate
        delete-branch: true
        title: Regenerate sample coverage
        body: Automated coverage regeneration from the latest OpenUI5 demo kit samples.

name: generate_coverage

# Regenerates COVERAGE.md: every UI5 demo kit sample per library, marked with
# whether an abap2UI5 port exists. The sample universe comes from a shallow
# OpenUI5 checkout; the ported set is read from this repo's *.clas.abap.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'   # weekly, Monday 03:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate_coverage
  cancel-in-progress: false

jobs:
  generate_coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout Repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '22'

    - name: Shallow clone OpenUI5 (sample universe)
      run: git clone --depth 1 https://github.com/SAP/openui5.git openui5

    - name: Generate COVERAGE.md
      env:
        OPENUI5_DIR: ./openui5
      run: node scripts/generate-coverage.mjs

    - name: Drop OpenUI5 checkout
      run: rm -rf openui5

    - name: Stamp last generated date into README
      run: |
        STAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
        sed -i "s|<!-- last-run -->.*<!-- /last-run -->|<!-- last-run -->$STAMP<!-- /last-run -->|" README.md

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        add-paths: |
          COVERAGE.md
          README.md
        commit-message: Regenerate sample coverage
        author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
        committer: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
        branch: generate_coverage/regenerate
        delete-branch: true
        title: Regenerate sample coverage
        body: Automated COVERAGE.md regeneration from the latest OpenUI5 demo kit samples.

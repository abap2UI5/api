name: checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pattern_lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
    - run: node scripts/pattern-lint.mjs

  property_gate:
    # every member a port uses must exist by UI5 1.71 (ui5/properties.json)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
    - run: node scripts/property-check.mjs

  structural_diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
    - run: node scripts/structural-diff.mjs --strict

  meta_valid:
    # meta/ sidecars are the source of truth (schema + referential integrity),
    # and the overview app is generated from them — fail on invalid sidecars
    # or when a change forgot to regenerate the overview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version: '22'
    - run: node scripts/validate-meta.mjs
    - run: node scripts/generate-overview.mjs
    - run: git diff --exit-code -- src
